<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form001.css">
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iuser">User:</label>
            <input type="text" name="user" id="iuser" required minlength="3" maxlength="15" size="10" placeholder="Your Name" autocomplete="username">
        </p>
        <p>
            <label for="ipass">Password:</label>
            <input type="password" name="pass" id="ipass" required minlength="8" maxlength="20" size="8" placeholder="Min 8">
        </p>
        <p>
            <input type="submit" value="Send!">
        </p>
    </form>
</body>
</html>
