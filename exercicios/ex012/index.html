<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente.</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>

    <video controls width="400" poster="imagens/balão.img" autoplay loop >
        <source src="midia/balão.mp4-1.mp4" type="video/mp4">]
        <source src="midia/balão.webm.webm" type="video/webm">
        <source src="midia/balão.mp4.mp4" type="video/mp4.2">
        <p>Seu navegador não compatibilidade com reprodução de videos.</p>
    </video>

    <h1>Inserindo vídeos do Youtube.</h1><iframe width="560" height="315" src="https://www.youtube.com/embed/jPWsBuiy1rE?si=47y8gN2mFxwv3hoW" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
