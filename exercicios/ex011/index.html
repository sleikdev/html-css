<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumenta e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>
    <h1>Reproduzindo áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <!--MP3,WAV,OGG-->
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/Without A Sound - Letter Box.mp3" type="audio/mpeg">
        <source src="midia/Without A Sound - Letter Box.ogg" type="audio/ogg">
        <source src="midia/Without A Sound - Letter Box.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consgue reproduzir áudio. <a href="midia/Without A Sound - Letter Box.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
</body>
</html>
