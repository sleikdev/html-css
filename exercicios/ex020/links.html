<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{ background-color: rgb(214, 214, 214);
            
        }

        ul{
            font-family: Arial, Helvetica, sans-serif;
            font-style: italic;
        }

        a{
            color: black;
            text-decoration: none;
            font-weight: bold;
        }

            a:visited{
                color: gray;
            }
        
            h1{
                text-decoration: underline;
            }

            a:hover{
                text-decoration: underline;
                color: black;
            }

            a:active{
                color: blue;
            }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site Curso em Video</a></li>
    </ul>
</body>
</html>
